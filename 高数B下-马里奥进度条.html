<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高数B下进度条</title>
  <style>
    :root {
      --sky: #79c7ff;
      --sky-deep: #4aa6ef;
      --ground: #8b5a2b;
      --brick: #d96b2b;
      --brick-dark: #9e3f18;
      --coin: #ffd23f;
      --coin-dark: #d39a00;
      --pipe: #169b55;
      --pipe-dark: #0c6e3b;
      --ink: #1f2933;
      --panel: #fff7df;
      --done: #35c46b;
      --danger: #e44d26;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, var(--sky) 0%, var(--sky) 60%, #b7ebff 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 22px clamp(16px, 4vw, 44px) 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 48px);
      line-height: 1;
      color: #ffffff;
      text-shadow: 3px 3px 0 #1f5f9b, 5px 5px 0 rgba(0, 0, 0, 0.16);
      letter-spacing: 0;
    }

    .time-card {
      flex: 0 0 auto;
      min-width: 112px;
      padding: 10px 12px;
      border: 4px solid #1f5f9b;
      background: #ffffff;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
      text-align: center;
      font-weight: 800;
    }

    .time-card small {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #58718c;
    }

    main {
      flex: 1;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 8px 0 34px;
    }

    .hud {
      border: 4px solid #1f5f9b;
      background: var(--panel);
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.18);
      padding: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      min-height: 58px;
      border: 3px solid #2f3338;
      background: #ffffff;
      padding: 8px 10px;
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.12);
    }

    .stat span {
      display: block;
      font-size: 12px;
      color: #6b7280;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
      line-height: 1;
    }

    .progress-track {
      position: relative;
      height: 30px;
      border: 4px solid #2f3338;
      background:
        linear-gradient(90deg, rgba(255,255,255,.45) 1px, transparent 1px) 0 0 / 24px 100%,
        #e7edf2;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.25) 1px, transparent 1px) 0 0 / 18px 100%,
        linear-gradient(180deg, #56e987, var(--done));
      transition: width .24s ease;
    }

    .runner {
      position: absolute;
      top: -13px;
      left: 0%;
      width: 42px;
      height: 42px;
      transform: translateX(-12px);
      transition: left .24s ease;
    }

    .runner::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 5px;
      width: 27px;
      height: 27px;
      background: var(--danger);
      border: 3px solid #2f3338;
      border-radius: 50% 50% 44% 44%;
      box-shadow: inset 0 -8px 0 #b8361b;
    }

    .runner::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 17px;
      width: 18px;
      height: 15px;
      background: #ffe0a3;
      border: 3px solid #2f3338;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 3px solid #2f3338;
      background: #ffffff;
      color: var(--ink);
      min-height: 38px;
      padding: 6px 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.18);
    }

    button:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.18);
    }

    .worlds {
      margin-top: 18px;
      display: grid;
      gap: 16px;
    }

    .world {
      border: 4px solid #2f3338;
      background: rgba(255, 247, 223, 0.94);
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.16);
      padding: 14px;
    }

    .world-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .world h2 {
      margin: 0;
      font-size: 20px;
    }

    .world-count {
      flex: 0 0 auto;
      font-weight: 800;
      color: #496175;
    }

    .blocks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(184px, 1fr));
      gap: 10px;
    }

    .block {
      position: relative;
      width: 100%;
      min-height: 76px;
      padding: 12px 12px 12px 48px;
      text-align: left;
      background:
        linear-gradient(90deg, rgba(255,255,255,.22) 1px, transparent 1px) 0 0 / 22px 100%,
        linear-gradient(180deg, #ef8a3a, var(--brick));
      color: #fff8e8;
      border-color: #5f2a14;
      text-shadow: 1px 1px 0 #5f2a14;
      box-shadow: 4px 4px 0 var(--brick-dark);
      transition: transform .16s ease, filter .16s ease, background .16s ease;
    }

    .block::before {
      content: "?";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 24px;
      height: 24px;
      margin-top: -12px;
      border: 3px solid rgba(95, 42, 20, .75);
      background: rgba(255, 255, 255, .2);
      display: grid;
      place-items: center;
      font-size: 17px;
      line-height: 1;
    }

    .block.done {
      background:
        linear-gradient(90deg, rgba(255,255,255,.22) 1px, transparent 1px) 0 0 / 22px 100%,
        linear-gradient(180deg, #4ddd7e, #22a95a);
      box-shadow: 4px 4px 0 #0e7438;
      color: #ffffff;
    }

    .block.done::before {
      content: "✓";
      background: var(--coin);
      color: #4b3600;
      text-shadow: none;
      border-color: var(--coin-dark);
    }

    .block-title {
      display: block;
      font-size: 16px;
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .block-note {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.25;
      color: rgba(255, 248, 232, .9);
    }

    .stage {
      position: relative;
      min-height: 74px;
      margin-top: auto;
      background:
        linear-gradient(90deg, rgba(0,0,0,.14) 2px, transparent 2px) 0 0 / 32px 100%,
        linear-gradient(180deg, #a96b34, var(--ground));
      border-top: 6px solid #4d2a17;
      overflow: hidden;
    }

    .pipe {
      position: absolute;
      right: clamp(18px, 8vw, 110px);
      bottom: 0;
      width: 78px;
      height: 58px;
      background: var(--pipe);
      border: 4px solid #064927;
      border-bottom: 0;
      box-shadow: inset -12px 0 0 var(--pipe-dark);
    }

    .pipe::before {
      content: "";
      position: absolute;
      left: -12px;
      top: -22px;
      width: 94px;
      height: 24px;
      background: #24b967;
      border: 4px solid #064927;
      box-shadow: inset -12px 0 0 var(--pipe-dark);
    }

    .cloud {
      position: fixed;
      z-index: -1;
      width: 140px;
      height: 48px;
      background: #ffffff;
      border-radius: 24px;
      opacity: .85;
      box-shadow: 36px -16px 0 10px #ffffff, 72px 0 0 0 #ffffff;
    }

    .cloud.one {
      left: 7vw;
      top: 122px;
    }

    .cloud.two {
      right: 16vw;
      top: 70px;
      transform: scale(.74);
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .blocks {
        grid-template-columns: 1fr;
      }

      .time-card {
        min-width: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="cloud one"></div>
  <div class="cloud two"></div>
  <div class="page">
    <header>
      <div class="topbar">
        <h1>高数B下通关进度</h1>
        <div class="time-card">
          <small>现在</small>
          <span id="clock">23:00</span>
        </div>
      </div>
    </header>

    <main>
      <section class="hud" aria-label="总进度">
        <div class="stats">
          <div class="stat">
            <span>总进度</span>
            <strong id="percentText">0%</strong>
          </div>
          <div class="stat">
            <span>已通关</span>
            <strong><span id="doneText">0</span>/<span id="totalText">0</span></strong>
          </div>
          <div class="stat">
            <span>金币</span>
            <strong id="coinText">0</strong>
          </div>
          <div class="stat">
            <span>下一块</span>
            <strong id="nextText">开始</strong>
          </div>
        </div>

        <div class="progress-track" aria-label="进度条">
          <div class="progress-fill" id="progressFill"></div>
          <div class="runner" id="runner"></div>
        </div>

        <div class="actions">
          <button id="nextBtn" type="button">下一块 +1</button>
          <button id="clearBtn" type="button">重置进度</button>
        </div>
      </section>

      <section class="worlds" id="worlds" aria-label="知识点板块"></section>
    </main>

    <div class="stage" aria-hidden="true">
      <div class="pipe"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "gaoshu-b-xu-progress-v1";

    const worlds = [
      {
        name: "World 8 多元函数微分学",
        items: [
          ["偏导数", "Chap 8-3"],
          ["全微分", "Chap 8-4"],
          ["高阶偏导数与链式法则", "Chap 8-5"],
          ["隐函数的微分法", "Chap 8-6"],
          ["方向导数与梯度", "Chap 8-7"],
          ["偏导数在几何上的应用", "Chap 8-8"],
          ["多元函数的泰勒公式", "Chap 8-9"],
          ["多元函数的极值", "Chap 8-10"]
        ]
      },
      {
        name: "World 9 重积分",
        items: [
          ["二重积分的概念与性质", "Chap 9-1"],
          ["二重积分的计算：直角坐标", "Chap 9-2 上"],
          ["二重积分的计算：极坐标与换元", "Chap 9-2 下"],
          ["三重积分", "Chap 9-3"]
        ]
      },
      {
        name: "World 10 曲线曲面积分",
        items: [
          ["第一型曲线积分", "Chap 10-1"],
          ["第一型曲面积分", "Chap 10-2"],
          ["第二型曲面积分", "Chap 11-2"]
        ]
      },
      {
        name: "World 12 三大公式",
        items: [
          ["格林公式", "Chap 12-1"],
          ["高斯公式", "Chap 12-2"],
          ["斯托克斯公式", "Chap 12-3"],
          ["梯度、散度和旋度", "Chap 12-4"]
        ]
      },
      {
        name: "World 13 级数",
        items: [
          ["常数项级数的概念和性质", "Chap 13-1"],
          ["正项级数", "Chap 13-2"],
          ["任意项级数", "Chap 13-3"],
          ["函数项级数", "Chap 13-4"],
          ["幂级数", "Chap 13-5"],
          ["函数的幂级数展开及应用", "Chap 13-6"],
          ["傅里叶级数", "Chap 13-7"]
        ]
      },
      {
        name: "World 14 微分方程",
        items: [
          ["微分方程的概念", "Chap 14-1"],
          ["一阶常微分方程", "Chap 14-2"],
          ["二阶微分方程", "Chap 14-3"]
        ]
      }
    ];

    const allItems = worlds.flatMap((world, worldIndex) =>
      world.items.map((item, itemIndex) => ({
        id: `${worldIndex}-${itemIndex}`,
        title: item[0],
        note: item[1],
        worldIndex
      }))
    );

    const state = {
      done: new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"))
    };

    const worldsEl = document.getElementById("worlds");
    const progressFill = document.getElementById("progressFill");
    const runner = document.getElementById("runner");
    const percentText = document.getElementById("percentText");
    const doneText = document.getElementById("doneText");
    const totalText = document.getElementById("totalText");
    const coinText = document.getElementById("coinText");
    const nextText = document.getElementById("nextText");
    const nextBtn = document.getElementById("nextBtn");
    const clearBtn = document.getElementById("clearBtn");
    const clock = document.getElementById("clock");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.done]));
    }

    function renderWorlds() {
      worldsEl.innerHTML = "";

      worlds.forEach((world, worldIndex) => {
        const section = document.createElement("article");
        section.className = "world";

        const head = document.createElement("div");
        head.className = "world-head";

        const title = document.createElement("h2");
        title.textContent = world.name;

        const count = document.createElement("div");
        count.className = "world-count";
        count.dataset.countFor = worldIndex;

        head.append(title, count);
        section.append(head);

        const blocks = document.createElement("div");
        blocks.className = "blocks";

        world.items.forEach((item, itemIndex) => {
          const id = `${worldIndex}-${itemIndex}`;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "block";
          button.dataset.id = id;

          const itemTitle = document.createElement("span");
          itemTitle.className = "block-title";
          itemTitle.textContent = item[0];

          const note = document.createElement("span");
          note.className = "block-note";
          note.textContent = item[1];

          button.append(itemTitle, note);
          button.addEventListener("click", () => {
            if (state.done.has(id)) {
              state.done.delete(id);
            } else {
              state.done.add(id);
            }
            save();
            update();
          });

          blocks.append(button);
        });

        section.append(blocks);
        worldsEl.append(section);
      });
    }

    function update() {
      const total = allItems.length;
      const done = state.done.size;
      const percent = Math.round((done / total) * 100);
      const precise = (done / total) * 100;
      const nextItem = allItems.find(item => !state.done.has(item.id));

      document.querySelectorAll(".block").forEach(block => {
        block.classList.toggle("done", state.done.has(block.dataset.id));
      });

      document.querySelectorAll("[data-count-for]").forEach(counter => {
        const worldIndex = Number(counter.dataset.countFor);
        const worldTotal = worlds[worldIndex].items.length;
        const worldDone = worlds[worldIndex].items.filter((_, itemIndex) =>
          state.done.has(`${worldIndex}-${itemIndex}`)
        ).length;
        counter.textContent = `${worldDone}/${worldTotal}`;
      });

      progressFill.style.width = `${precise}%`;
      runner.style.left = `${Math.min(100, Math.max(0, precise))}%`;
      percentText.textContent = `${percent}%`;
      doneText.textContent = done;
      totalText.textContent = total;
      coinText.textContent = done * 100;
      nextText.textContent = nextItem ? nextItem.title : "通关";
    }

    function completeNext() {
      const nextItem = allItems.find(item => !state.done.has(item.id));
      if (!nextItem) return;
      state.done.add(nextItem.id);
      save();
      update();
      const button = document.querySelector(`[data-id="${nextItem.id}"]`);
      if (button) button.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearProgress() {
      if (!confirm("确定重置所有进度吗？")) return;
      state.done.clear();
      save();
      update();
    }

    function tickClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    nextBtn.addEventListener("click", completeNext);
    clearBtn.addEventListener("click", clearProgress);

    renderWorlds();
    update();
    tickClock();
    setInterval(tickClock, 30000);
  </script>
</body>
</html>
